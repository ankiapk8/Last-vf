    <script>
      (function() {
        try {
          var stored = localStorage.getItem("ankigen-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored ? stored === "dark" : prefersDark;
          if (!isDark) {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch(e) {}
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      #app-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
        background: radial-gradient(ellipse at 20% 30%, hsl(150 40% 8%) 0%, hsl(220 30% 6%) 55%, hsl(150 20% 4%) 100%);
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, Roboto, sans-serif;
        transition: opacity 700ms ease, visibility 700ms ease;
        overflow: hidden;
      }
      #app-splash.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      /* Ambient orbs */
      .sp-orb {
        position: absolute; border-radius: 50%; pointer-events: none;
        filter: blur(60px); animation: spOrb 8s ease-in-out infinite;
      }
      .sp-orb-1 { width: 400px; height: 400px; top: -100px; left: -80px; background: radial-gradient(circle, hsl(150 60% 40% / 0.08), transparent 70%); animation-duration: 7s; }
      .sp-orb-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: radial-gradient(circle, hsl(220 60% 50% / 0.07), transparent 70%); animation-duration: 10s; animation-direction: reverse; }
      .sp-orb-3 { width: 300px; height: 300px; top: 40%; left: 60%; background: radial-gradient(circle, hsl(280 60% 50% / 0.06), transparent 70%); animation-duration: 9s; animation-delay: -3s; }
      @keyframes spOrb {
        0%,100% { transform: translate(0,0) scale(1); }
        33% { transform: translate(20px,-25px) scale(1.06); }
        66% { transform: translate(-15px,20px) scale(0.95); }
      }

      /* Particle dots */
      .sp-particle {
        position: absolute; border-radius: 50%; pointer-events: none;
        animation: spParticle linear infinite;
      }
      @keyframes spParticle {
        0% { opacity: 0; transform: translateY(0) scale(0.5); }
        20% { opacity: 0.8; }
        80% { opacity: 0.3; }
        100% { opacity: 0; transform: translateY(-80px) scale(0); }
      }

      /* Center content */
      .sp-center {
        position: relative; display: flex; flex-direction: column; align-items: center;
        gap: 20px; width: 100%; max-width: 440px; padding: 0 24px;
      }

      /* Logo */
      .sp-logo-wrap {
        position: relative; width: 88px; height: 88px;
        opacity: 0; animation: spFadeUp 0.8s cubic-bezier(.2,.8,.2,1) 0.1s forwards;
      }
      .sp-logo-ring {
        position: absolute; inset: -10px; border-radius: 28px;
        background: conic-gradient(from 0deg, hsl(150 60% 55%), hsl(95 65% 50%), hsl(220 70% 60%), hsl(150 60% 55%));
        filter: blur(14px); opacity: 0.5;
        animation: spRingSpin 4s linear infinite;
      }
      @keyframes spRingSpin { to { transform: rotate(360deg); } }
      .sp-logo-img {
        position: relative; width: 88px; height: 88px; border-radius: 22px;
        overflow: hidden; display: block;
        animation: spLogoPulse 2.4s ease-in-out infinite 1s;
      }
      .sp-logo-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
      @keyframes spLogoPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

      /* Title */
      .sp-title {
        text-align: center;
        opacity: 0; animation: spFadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.4s forwards;
      }
      .sp-title h1 {
        font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin: 0;
        background: linear-gradient(135deg, #34d399 0%, #6ee7b7 40%, #67e8f9 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .sp-title p {
        margin: 6px 0 0; font-size: 12px; font-weight: 500;
        color: rgba(255,255,255,0.38); letter-spacing: 0.2em; text-transform: uppercase;
      }

      /* Feature ticker */
      .sp-features {
        width: 100%; overflow: hidden;
        opacity: 0; animation: spFadeUp 0.6s cubic-bezier(.2,.8,.2,1) 0.75s forwards;
      }
      .sp-features-track {
        display: flex; gap: 10px;
        animation: spScroll 18s linear infinite;
        width: max-content;
      }
      @keyframes spScroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .sp-chip {
        display: flex; align-items: center; gap: 7px;
        padding: 7px 14px; border-radius: 50px; white-space: nowrap; flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.05);
        font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.65);
        backdrop-filter: blur(4px);
      }
      .sp-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

      /* Progress bar */
      .sp-bar-wrap {
        width: 180px; height: 2px; border-radius: 999px;
        background: rgba(255,255,255,0.08); overflow: hidden;
        opacity: 0; animation: spFadeUp 0.6s cubic-bezier(.2,.8,.2,1) 1s forwards;
      }
      .sp-bar {
        height: 100%; width: 0%; border-radius: 999px;
        background: linear-gradient(90deg, #34d399, #6ee7b7);
        animation: spBarGrow 2.6s cubic-bezier(.4,0,.2,1) 1s forwards,
                   spBarShimmer 1.4s ease-in-out infinite 1.2s;
      }
      @keyframes spBarGrow { to { width: 85%; } }
      @keyframes spBarShimmer {
        0%,100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      @keyframes spFadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-splash * { animation: none !important; transition: none !important; }
        .sp-logo-wrap, .sp-title, .sp-features, .sp-bar-wrap { opacity: 1 !important; transform: none !important; }
        .sp-bar { width: 70% !important; }
      }
    </style>

      <div class="sp-particle" style="width:3px;height:3px;left:18%;top:30%;background:hsl(280 70% 70%/0.5);animation-duration:3.4s;animation-delay:1.2s;"></div>
      <div class="sp-particle" style="width:2px;height:2px;left:92%;top:45%;background:hsl(150 70% 65%/0.6);animation-duration:2.5s;animation-delay:2s;"></div>

      <div class="sp-center">
        <div class="sp-logo-wrap">

        <div class="sp-title">
