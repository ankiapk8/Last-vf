<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="40%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.25" r="0.85">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#34D399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#022C22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="cardMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="cardFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="55%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>
    <linearGradient id="aiBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="20" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Tile background -->
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#bgGlow)"/>

  <!-- Subtle inner ring -->
  <rect x="32" y="32" width="960" height="960" rx="206" ry="206"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="3"/>

  <!-- Decorative orbiting dots -->
  <g fill="#ECFDF5" opacity="0.55">
    <circle cx="170" cy="220" r="6"/>
    <circle cx="860" cy="200" r="5"/>
    <circle cx="200" cy="820" r="7"/>
    <circle cx="840" cy="830" r="5"/>
    <circle cx="512" cy="100" r="4"/>
    <circle cx="100" cy="500" r="4"/>
    <circle cx="924" cy="520" r="5"/>
  </g>

  <!-- Radial glow behind cards -->
  <circle cx="512" cy="540" r="320" fill="url(#bgGlow)" opacity="0.85"/>

  <!-- Fanned flashcards -->
  <g filter="url(#cardShadow)">
    <!-- Card 3 (back, rotated left) -->
    <g transform="translate(512 560) rotate(-22)">
      <rect x="-260" y="-340" width="520" height="680" rx="56" ry="56" fill="url(#cardBack)"/>
      <rect x="-260" y="-340" width="520" height="60" fill="#34D399" opacity="0.6"/>
    </g>
    <!-- Card 2 (rotated right) -->
    <g transform="translate(512 560) rotate(14)">
      <rect x="-260" y="-340" width="520" height="680" rx="56" ry="56" fill="url(#cardMid)"/>
      <rect x="-260" y="-340" width="520" height="60" fill="#86EFAC" opacity="0.7"/>
    </g>
    <!-- Card 1 (front, straight) -->
    <g transform="translate(512 560)">
      <rect x="-260" y="-340" width="520" height="680" rx="56" ry="56" fill="url(#cardFront)"/>
      <!-- Top bar -->
      <rect x="-260" y="-340" width="520" height="78" rx="56" ry="56" fill="url(#topBar)"/>
      <rect x="-260" y="-280" width="520" height="20" fill="#15803D"/>
      <!-- Top bar dots (window-style) -->
      <g transform="translate(-220 -300)">
        <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.9"/>
        <circle cx="22" cy="0" r="8" fill="#FFFFFF" opacity="0.55"/>
        <circle cx="44" cy="0" r="8" fill="#FFFFFF" opacity="0.35"/>
      </g>
      <!-- Big letter A -->
      <text x="0" y="170" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="540" font-weight="900" fill="url(#letter)" letter-spacing="-22">A</text>
      <!-- Subtitle bars -->
      <rect x="-150" y="240" width="300" height="22" rx="11" fill="#86EFAC"/>
      <rect x="-100" y="280" width="200" height="14" rx="7" fill="#BBF7D0"/>
    </g>
  </g>

  <!-- AI lightning bolt accent -->
  <g filter="url(#boltGlow)" transform="translate(740 240) rotate(8)">
    <path d="M-40,-110 L40,-30 L-10,-20 L40,110 L-40,30 L10,20 Z"
          fill="url(#bolt)" stroke="#92400E" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- AI badge ribbon -->
  <g transform="translate(760 760)" filter="url(#softGlow)">
    <rect x="-72" y="-30" width="144" height="60" rx="30" ry="30" fill="url(#aiBadge)"
          stroke="#92400E" stroke-width="3"/>
    <text x="0" y="14" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="40" font-weight="900" fill="#7C2D12" letter-spacing="2">AI</text>
  </g>

  <!-- Sparkles -->
  <g filter="url(#softGlow)">
    <g transform="translate(220 320)">
      <path d="M0,-32 L8,-8 L32,0 L8,8 L0,32 L-8,8 L-32,0 L-8,-8 Z" fill="#FEF08A"/>
    </g>
    <g transform="translate(840 460)">
      <path d="M0,-22 L6,-6 L22,0 L6,6 L0,22 L-6,6 L-22,0 L-6,-6 Z" fill="#FDE68A"/>
    </g>
    <g transform="translate(280 760)">
      <path d="M0,-26 L7,-7 L26,0 L7,7 L0,26 L-7,7 L-26,0 L-7,-7 Z" fill="#FDE68A"/>
    </g>
  </g>

  <!-- Bottom highlight -->
  <ellipse cx="512" cy="940" rx="380" ry="22" fill="#000000" opacity="0.18"/>
</svg>
